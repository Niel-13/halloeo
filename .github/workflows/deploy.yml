name: Deploy Laravel to cPanel via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql, fileinfo, openssl, tokenizer, xml, ctype, json, bcmath
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Prepare public index for cPanel structure
        run: |
          cat > public/index.php <<'PHP'
          <?php

          use Illuminate\Foundation\Application;
          use Illuminate\Http\Request;

          define('LARAVEL_START', microtime(true));

          if (file_exists($maintenance = __DIR__.'/../halloeoweb/storage/framework/maintenance.php')) {
              require $maintenance;
          }

          require __DIR__.'/../halloeoweb/vendor/autoload.php';

          /** @var Application $app */
          $app = require_once __DIR__.'/../halloeoweb/bootstrap/app.php';

          $app->usePublicPath(__DIR__);

          $app->handleRequest(Request::capture());
          PHP

      - name: Deploy Laravel core to halloeoweb
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          local-dir: ./
          server-dir: /halloeoweb/
          state-name: .ftp-deploy-sync-state-core.json
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            .env
            .env.*
            node_modules/**
            public/**
            tests/**
            vendor/**
            vendor.zip
            README.md
            storage/logs/**
            storage/framework/cache/**
            storage/framework/sessions/**
            storage/framework/views/**
            bootstrap/cache/*.php

      - name: Deploy public files to public_html
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          local-dir: public/
          server-dir: /public_html/
          state-name: .ftp-deploy-sync-state-public.json
          exclude: |
            portfolio/**
            galleries/**
            services/**
            storage/**