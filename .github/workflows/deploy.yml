name: Deploy to cPanel via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Build CSS & JS (public/build ada di .gitignore jadi harus di-build dulu)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build Assets
        run: |
          npm ci
          npm run build

      # Disable IPv6 agar koneksi FTP hanya pakai IPv4
      - name: Disable IPv6
        run: |
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1

      # Deploy folder Laravel inti (tanpa public & vendor karena sudah ada di server)
      - name: Sync Laravel App Files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          local-dir: ./
          server-dir: laravel_app/
          state-name: .ftp-deploy-sync-state-app.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/vendor/**
            public/**

      # Deploy public (tanpa index.php & .htaccess karena sudah dikelola manual)
      - name: Sync Public Files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          local-dir: public/
          server-dir: public_html/
          state-name: .ftp-deploy-sync-state-public.json
          exclude: |
            **/.git*
            index.php
            .htaccess